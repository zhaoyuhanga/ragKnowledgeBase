# ================================================
# RAG知识库系统 - 开发环境配置
# 环境：dev
# 说明：团队联调使用，敏感信息必须从环境变量读取
# ================================================

# 服务器配置
server:
  port: 8011
  host: 0.0.0.0
  reload: false
  workers: 2

# 数据库配置 - MySQL 8.0
database:
  host: ${MYSQL_HOST:dev-mysql}
  port: ${MYSQL_PORT:3308}
  username: ${MYSQL_USERNAME}
  password: ${MYSQL_PASSWORD}
  name: ${MYSQL_DATABASE:rag_db}
  charset: utf8mb4
  pool_size: 10
  max_overflow: 20
  pool_recycle: 3600
  echo: false

# Redis配置
redis:
  host: ${REDIS_HOST:dev-redis}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  db: 0
  decode_responses: true
  socket_timeout: 5
  socket_connect_timeout: 5

# Milvus向量数据库配置
milvus:
  host: ${MILVUS_HOST:dev-milvus}
  port: ${MILVUS_PORT:19530}
  timeout: 30
  pool_size: 20
  alias: default

# RabbitMQ消息队列配置
rabbitmq:
  host: ${RABBITMQ_HOST:dev-rabbitmq}
  port: ${RABBITMQ_PORT:5672}
  username: ${RABBITMQ_USERNAME}
  password: ${RABBITMQ_PASSWORD}
  virtual_host: /
  heartbeat: 60
  connection_timeout: 10
  exchange:
    name: rag_exchange
    type: topic
    durable: true
  queues:
    parse_queue:
      name: rag_parse_queue
      routing_key: rag.parse.#
      durable: true
    clean_queue:
      name: rag_clean_queue
      routing_key: rag.clean.#
      durable: true
    chunk_queue:
      name: rag_chunk_queue
      routing_key: rag.chunk.#
      durable: true
    embedding_queue:
      name: rag_embedding_queue
      routing_key: rag.embedding.#
      durable: true

# 应用配置
app:
  name: RAG知识库系统
  version: 1.0.0
  debug: false
  env: dev
  description: RAG知识库系统后端API服务

# 日志配置
logging:
  level: INFO
  format: json
  audit_enabled: true
  file:
    enabled: true
    path: ./logs/app.log
    max_bytes: 104857600
    backup_count: 10
  console:
    enabled: true

# CORS跨域配置
cors:
  enabled: true
  allow_origins:
    - http://dev-frontend.example.com
  allow_methods:
    - "*"
  allow_headers:
    - "*"
  allow_credentials: true

# API文档配置
api:
  title: RAG知识库系统API
  description: 基于FastAPI的RAG知识库系统后端接口
  version: 1.0.0
  prefix: /api/v1
  docs_url: /docs
  redoc_url: /redoc

# 文档解析配置
document:
  upload:
    max_size: 104857600
    allowed_extensions:
      - pdf
      - docx
      - doc
      - txt
      - md
      - html
      - xlsx
      - xls
  storage:
    base_path: /data/uploads
    temp_path: /data/temp
  parsing:
    ocr_enabled: true
    ocr_language: chn_sim
    max_pages: 1000

# 切分配置
chunk:
  target_tokens: 600
  max_tokens: 900
  min_tokens: 120
  overlap_tokens: 100
  semantic_threshold: 0.85

# 向量化配置
embedding:
  model_name: Qwen3-Embedding
  dimension: 1024
  batch_size: 32
  cache_enabled: true
  cache_ttl: 86400
  # Ollama 配置
  use_ollama: true
  ollama_host: ${OLLAMA_HOST:http://localhost:11434}
  ollama_timeout: 120
  ollama_retry_times: 3
  fallback_to_mock: true

# 检索配置
retrieval:
  vector_top_k: 50
  keyword_top_k: 50
  fusion_top_k: 20
  rerank_top_k: 10
  vector_weight: 0.6
  keyword_weight: 0.4

# JWT认证配置
jwt:
  secret_key: ${JWT_SECRET_KEY}
  algorithm: HS256
  access_token_expire_minutes: 120
  refresh_token_expire_days: 7

# 缓存配置
cache:
  embedding:
    ttl: 86400
    max_size: 10000
  query:
    ttl: 3600
    max_size: 5000
