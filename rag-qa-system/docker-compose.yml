# ============================================================
# RAG 问答系统 - Docker 部署配置
# 使用 Docker Compose 一键部署完整运行环境
# ============================================================

version: '3.8'

services:
  # ============================================================
  # FastAPI 应用
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-qa-app
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # 应用配置
      - APP_ENV=${APP_ENV:-development}
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      
      # MySQL 配置
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE:-rag_qa}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-root_password}
      
      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      
      # DeepSeek API 配置
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - DEEPSEEK_TIMEOUT=${DEEPSEEK_TIMEOUT:-60}
      
      # ChromaDB 配置
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - CHROMA_COLLECTION_NAME=${CHROMA_COLLECTION_NAME:-knowledge_base}
      
      # Embedding 配置
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - EMBEDDING_DEVICE=cpu
      
      # 文本切分配置
      - CHUNK_SIZE=${CHUNK_SIZE:-500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      
      # 向量检索配置
      - RETRIEVAL_TOP_K=${RETRIEVAL_TOP_K:-5}
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD:-0.3}
    volumes:
      # 持久化数据
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================
  # MySQL 数据库
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: rag-qa-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD:-root_password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-rag_qa}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-root_password}
    volumes:
      # 初始化脚本
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
      # 持久化数据
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=500
      --innodb_buffer_pool_size=256M
    restart: unless-stopped
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================================
  # Redis 缓存
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: rag-qa-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      # 持久化数据
      - redis_data:/data
    restart: unless-stopped
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================================
# 网络配置
# ============================================================
networks:
  rag-network:
    driver: bridge

# ============================================================
# 持久化卷配置
# ============================================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
